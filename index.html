<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이채립 게임즈 - Lee Chae Rip Games</title>
    
    <link rel="shortcut icon" href="app-icon.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="app-icon.png">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 부드러운 전환 효과 및 애니메이션 */
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-zoom-in {
            animation: zoomIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        /* 스크롤 포커스 시 부드럽게 반짝이는 하이라이트 효과 */
        .card-highlight {
            ring: 4px solid #6366f1;
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgb(99 102 241 / 0.15), 0 8px 10px -6px rgb(99 102 241 / 0.15);
        }

        /* 🔗 토스트 알림 애니메이션 */
        @keyframes toastSlideUp {
            0% { transform: translate(-50%, 100%); opacity: 0; }
            15% { transform: translate(-50%, 0); opacity: 1; }
            85% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 100%); opacity: 0; }
        }
        .toast-animate {
            animation: toastSlideUp 3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 selection:bg-indigo-200 scroll-smooth relative">

    <!-- 🌟 반 별(0.5점) 렌더링 호환성을 100% 보장하는 SVG 그라데이션 정의 (최상단 배치) -->
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" aria-hidden="true" focusable="false">
        <defs>
            <linearGradient id="half-star-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="50%" stop-color="#fbbf24"></stop> <!-- 노란색 (amber-400) -->
                <stop offset="50%" stop-color="#cbd5e1"></stop> <!-- 회색 (slate-300) -->
            </linearGradient>
        </defs>
    </svg>

    <!-- Header Section (로고 및 타이틀) -->
    <header class="pt-16 pb-12 px-4 bg-white border-b border-slate-100">
        <div class="max-w-5xl mx-auto flex flex-col items-center text-center">
            
            <!-- 브랜드 로고 마크 -->
            <div class="relative mb-6 group">
                <div class="absolute inset-0 bg-indigo-500 rounded-3xl blur-xl opacity-20 group-hover:opacity-40 transition-all duration-500 group-hover:scale-110"></div>
                <div class="relative w-24 h-24 bg-white rounded-3xl shadow-md flex items-center justify-center transform group-hover:rotate-6 transition-all duration-300 overflow-hidden border border-slate-100">
                    <img id="main-logo-img" src="logo.png" alt="이채립 게임즈 로고" class="w-full h-full object-cover z-10" onerror="this.style.display='none'; this.parentNode.classList.add('bg-gradient-to-tr', 'from-indigo-500', 'to-purple-600'); document.getElementById('fallback-logo-icon').classList.remove('hidden');">
                    <i id="fallback-logo-icon" data-lucide="gamepad-2" class="w-12 h-12 text-white animate-pulse hidden"></i>
                </div>
            </div>

            <!-- 타이틀 -->
            <h1 class="text-4xl md:text-5xl font-black tracking-tight text-slate-900 mb-3">
                이채립 게임즈
            </h1>
            <p class="text-xs md:text-sm font-semibold tracking-[0.3em] text-indigo-500 uppercase">
                Lee Chae Rip Games
            </p>
        </div>
    </header>

    <!-- Main Content Section -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        
        <!-- Quick Overview Section -->
        <section class="mb-14">
            <div class="bg-gradient-to-r from-slate-50 to-slate-100/50 rounded-3xl border border-slate-200/80 p-6 md:p-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-50 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2 opacity-70"></div>
                
                <div class="flex items-center justify-between mb-8 border-b border-slate-200/60 pb-4">
                    <h2 class="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="sparkles" class="w-5 h-5 text-yellow-500 fill-yellow-500"></i> 모든 게임 한 눈에 보기
                    </h2>
                    <span id="game-count-badge" class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-bold"></span>
                </div>
                
                <div id="quick-overview-container" class="space-y-6"></div>
            </div>
        </section>

        <!-- 게임 카테고리별 섹션들이 배치될 공간 -->
        <div id="games-container" class="space-y-16"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-10 text-center text-slate-400 text-sm">
        <p class="font-semibold text-slate-500 mb-1">Lee Chae Rip Games</p>
        <p>© 2026 이채립. All rights reserved.</p>
    </footer>

    <!-- Game Modal (Iframe 팝업창) -->
    <div id="game-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm hidden">
        <div class="bg-white w-full max-w-5xl h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden modal-zoom-in">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <div class="flex flex-col">
                    <h3 id="modal-title" class="text-xl font-bold text-slate-800">게임 제목</h3>
                    <span id="modal-desc" class="text-xs text-slate-500">게임 설명</span>
                </div>
                
                <div class="flex items-center gap-2">
                    <a id="modal-external-link" href="#" target="_blank" rel="noreferrer" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all" title="새 창에서 열기">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </a>
                    <button id="close-modal-btn" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-all">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
            
            <!-- Modal Iframe -->
            <div class="flex-1 w-full bg-black relative">
                <div class="absolute inset-0 flex items-center justify-center text-white/50 z-0">
                    <div class="flex flex-col items-center gap-2">
                        <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-sm">게임을 불러오는 중...</p>
                    </div>
                </div>
                <iframe id="modal-iframe" src="" title="게임 화면" class="w-full h-full border-0 relative z-10" allow="autoplay; fullscreen"></iframe>
            </div>
        </div>
    </div>

    <!-- 🔗 링크 복사 완료 토스트 알림 모달 -->
    <div id="toast-container" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none hidden">
        <div class="bg-slate-800/95 backdrop-blur border border-slate-700 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-3 text-sm font-medium">
            <div class="p-1 bg-green-500 rounded-full">
                <i data-lucide="check" class="w-3 h-3 text-white stroke-[3]"></i>
            </div>
            <span id="toast-message">게임 링크가 복사되었습니다! 🎉</span>
        </div>
    </div>

    <!-- JavaScript logic -->
    <script type="module">
        // 1. Firebase SDK 및 Firestore 불러오기
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        // 2. Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCiBIHltbbxp9BKSM381PyHe8VoBEwRvvo",
            authDomain: "lcrgames-5a217.firebaseapp.com",
            projectId: "lcrgames-5a217",
            storageBucket: "lcrgames-5a217.firebasestorage.app",
            messagingSenderId: "430370379756",
            appId: "1:430370379756:web:25f14f67e60d33054b12c9",
            measurementId: "G-6LRSMKVTQD"
        };

        // 3. Firebase 및 Firestore 초기화
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 앱아이디 및 유저아이디 관리 변수 (Firestore 규칙 준수)
        const appId = "lcrgames-5a217";
        let userId = localStorage.getItem("lcr_user_uuid") || "";
        if (!userId) {
            userId = crypto.randomUUID();
            localStorage.setItem("lcr_user_uuid", userId);
        }

        // 실시간 전역 상태 객체 (평점 sum이 소수점을 수용할 수 있음)
        const state = {
            games: {},       // gameCardId -> { ratingSum: 0, ratingCount: 0 }
            userRatings: {}  // gameCardId -> 내가 입력한 평점 (0.5 ~ 5.0)
        };

        // 안전한 CSS 선택자용 ID 생성기 (특수문자 및 공백 완벽 제거)
        function getSafeId(title) {
            return 'game-card-' + title.replace(/[^a-zA-Z0-9가-힣-_]/g, '-').replace(/-+/g, '-');
        }

        // 게임 데이터 구조
        const gameData = [
            {
                category: "종합 게임", icon: "gamepad-2", iconColor: "text-indigo-500", bgColor: "bg-indigo-50", color: "from-indigo-400 to-purple-500",
                games: [
                    { title: "Animal Hoops", desc: "동물 농구 게임", url: "https://cherryb29.github.io/AnimalHoops/", icon: "dog" },
                    { title: "증강 : 체스", desc: "여러가지 특수 능력이 있는 증강 체스게임", url: "https://cherryb29.github.io/Chess/", icon: "swords" }
                ]
            },
            {
                category: "밥 시리즈", icon: "utensils", iconColor: "text-orange-500", bgColor: "bg-orange-50", color: "from-orange-400 to-red-500",
                games: [
                    { title: "밥", desc: "메뉴 추천 수집 게임", url: "https://cherryb29.github.io/bob/", icon: "chef-hat" },
                    { title: "머지 밥", desc: "음식 합치기 게임", url: "https://cherryb29.github.io/MergeBob/", icon: "pizza" },
                    { title: "디펜스 밥", desc: "음식 디펜스 게임", url: "https://cherryb29.github.io/defense-bob/", icon: "shield" }
                ]
            },
            {
                category: "퀴즈", icon: "brain", iconColor: "text-teal-500", bgColor: "bg-teal-50", color: "from-teal-400 to-emerald-500",
                games: [
                    { title: "절대 색감 퀴즈", desc: "절대 색감 퀴즈", url: "https://cherryb29.github.io/ColorQuiz/", icon: "palette" },
                    { title: "가짜 뉴스 판별 퀴즈", desc: "가짜 뉴스 판별 퀴즈", url: "https://cherryb29.github.io/AIQuiz/", icon: "file-question" },
                    { title: "Math Master", desc: "순열과 조합 연산 퀴즈", url: "https://cherryb29.github.io/combinationPractice/", icon: "calculator" },
                    { title: "오비탈 퀴즈", desc: "화학 오비탈 퀴즈", url: "https://cherryb29.github.io/orbital-quiz/", icon: "atom" },
                    { title: "한국지리 마스터", desc: "한국 지리 퀴즈", url: "https://cherryb29.github.io/KoreanGeography/", icon: "map" },
                    { title: "세계지리 마스터", desc: "세계지리 마스터", url: "https://cherryb29.github.io/WorldGeography/", icon: "globe" }
                ]
            }
        ];

        // DOM 요소 가져오기
        const quickOverviewContainer = document.getElementById('quick-overview-container');
        const gamesContainer = document.getElementById('games-container');
        const gameModal = document.getElementById('game-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalExternalLink = document.getElementById('modal-external-link');
        const modalIframe = document.getElementById('modal-iframe');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const gameCountBadge = document.getElementById('game-count-badge');
        const toastContainer = document.getElementById('toast-container');
        const toastMessage = document.getElementById('toast-message');
        let toastTimeout; 

        // 모달 열기 함수
        function openGame(game) {
            modalTitle.textContent = game.title;
            modalDesc.textContent = game.desc;
            modalExternalLink.href = game.url;
            modalIframe.src = game.url; 
            
            gameModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 모달 닫기 함수
        function closeModal() {
            gameModal.classList.add('hidden');
            modalIframe.src = ''; 
            document.body.style.overflow = 'unset';
        }

        // 부드러운 스크롤 함수
        function scrollToGame(gameId) {
            const targetCard = document.getElementById(gameId);
            if (targetCard) {
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetCard.classList.add('card-highlight', 'ring-4', 'ring-indigo-500/40');
                setTimeout(() => {
                    targetCard.classList.remove('card-highlight', 'ring-4', 'ring-indigo-500/40');
                }, 1500);
            }
        }

        // 클립보드 복사 함수 (iFrame 호환)
        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
            } catch (err) {
                console.error('링크 복사에 실패했습니다.', err);
            }
            document.body.removeChild(textarea);
        }

        // 토스트 알림 표시 함수
        function showToast(message) {
            toastMessage.textContent = message;
            clearTimeout(toastTimeout);
            toastContainer.classList.remove('hidden', 'toast-animate');
            void toastContainer.offsetWidth; // 강제 리플로우 (애니메이션 재시작)
            toastContainer.classList.add('toast-animate');
            toastContainer.classList.remove('hidden');
            
            toastTimeout = setTimeout(() => {
                toastContainer.classList.add('hidden');
                toastContainer.classList.remove('toast-animate');
            }, 3000); 
        }

        // 총 게임 수 배지
        let totalGamesCount = 0;
        gameData.forEach(section => totalGamesCount += section.games.length);
        gameCountBadge.textContent = `총 ${totalGamesCount}개`;

        // 1. "한 눈에 보기" 영역 생성
        gameData.forEach(section => {
            const seriesRow = document.createElement('div');
            seriesRow.className = "flex flex-col md:flex-row md:items-start gap-4 pb-4 border-b border-slate-200/40 last:border-0 last:pb-0";
            
            const seriesLabel = document.createElement('div');
            seriesLabel.className = "flex items-center gap-2 text-sm font-extrabold text-slate-500 w-full md:w-32 pt-2.5 shrink-0";
            seriesLabel.innerHTML = `<i data-lucide="${section.icon}" class="w-4 h-4 ${section.iconColor}"></i><span>${section.category}</span>`;
            seriesRow.appendChild(seriesLabel);

            const miniGrid = document.createElement('div');
            miniGrid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 w-full";

            section.games.forEach(game => {
                const gameCardId = getSafeId(game.title);
                const card = document.createElement('button');
                card.className = "flex flex-col items-start p-3 bg-white hover:bg-slate-50 border border-slate-200/60 rounded-2xl text-left transition-all duration-300 shadow-sm hover:shadow hover:border-indigo-300 transform hover:-translate-y-0.5 group w-full relative overflow-hidden";
                
                card.innerHTML = `
                    <div class="flex items-center gap-2.5 w-full mb-1">
                        <div class="p-1.5 rounded-lg ${section.bgColor} group-hover:scale-110 transition-all duration-300">
                            <i data-lucide="${game.icon}" class="w-4 h-4 ${section.iconColor}"></i>
                        </div>
                        <span class="text-[10px] font-bold text-slate-400 block truncate max-w-[55px]">${section.category}</span>
                        
                        <!-- 🔥 인기 딱지 -->
                        <span class="popular-badge-${gameCardId} hidden px-1.5 py-0.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white text-[9px] font-black rounded-md ml-auto shadow animate-pulse">인기</span>
                    </div>
                    <span class="text-xs font-bold text-slate-800 line-clamp-1 group-hover:text-indigo-600 transition-colors">${game.title}</span>
                    
                    <!-- 실시간 통계 노출 영역 (평점만 노출) -->
                    <div class="flex items-center gap-2 mt-1.5 text-[10px] text-slate-400 font-bold">
                        <span class="flex items-center gap-0.5"><i data-lucide="star" class="w-3 h-3 text-amber-400 fill-amber-400"></i> <span class="mini-rating-${gameCardId}">0.0</span></span>
                    </div>
                `;
                card.addEventListener('click', () => scrollToGame(gameCardId));
                miniGrid.appendChild(card);
            });

            seriesRow.appendChild(miniGrid);
            quickOverviewContainer.appendChild(seriesRow);
        });

        // 2. 상세 게임 카드 생성
        gameData.forEach(section => {
            const secElement = document.createElement('section');
            secElement.className = "mb-16";

            const headerDiv = document.createElement('div');
            headerDiv.className = "flex items-center gap-3 mb-6 border-b-2 border-slate-200 pb-3";
            headerDiv.innerHTML = `<i data-lucide="${section.icon}" class="w-6 h-6 ${section.iconColor}"></i><h2 class="text-2xl font-bold text-slate-800">${section.category}</h2>`;
            secElement.appendChild(headerDiv);

            const gridDiv = document.createElement('div');
            gridDiv.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8";

            section.games.forEach(game => {
                const gameCardId = getSafeId(game.title);
                const card = document.createElement('div');
                card.id = gameCardId;
                card.className = "group bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 cursor-pointer overflow-hidden border border-slate-100 flex flex-col relative";

                card.innerHTML = `
                    <!-- 상세 카드 위에 띄울 인기 딱지 -->
                    <div class="popular-card-badge-${gameCardId} hidden absolute top-3 left-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white text-[10px] font-black px-2.5 py-1 rounded-full shadow-lg z-30 flex items-center gap-1 animate-bounce">
                        🔥 TOP 인기 게임
                    </div>

                    <div class="h-44 bg-slate-900 relative overflow-hidden flex items-center justify-center border-b border-slate-100">
                        <div class="absolute inset-0 bg-gradient-to-br ${section.color} opacity-40 z-0"></div>
                        <iframe src="${game.url}" title="${game.title} 미리보기" class="absolute inset-0 w-[125%] h-[125%] origin-top-left scale-[0.8] border-0 pointer-events-none z-10 opacity-80 group-hover:opacity-100 transition-opacity duration-300" scrolling="no" loading="lazy"></iframe>
                        <div class="absolute inset-0 bg-slate-950/10 group-hover:bg-slate-950/30 transition-all duration-300 z-20 flex items-center justify-center">
                            <div class="bg-white/90 backdrop-blur-sm p-3 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transform scale-90 group-hover:scale-100 transition-all duration-300 z-30 pointer-events-none">
                                <i data-lucide="play" class="w-6 h-6 text-indigo-600 fill-indigo-600"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-5 flex-1 flex flex-col justify-between relative z-30">
                        <div>
                            <h3 class="text-xl font-bold text-slate-800 mb-2 group-hover:text-indigo-600 transition-colors flex items-center gap-2">
                                <i data-lucide="${game.icon}" class="w-5 h-5 text-slate-400 group-hover:text-indigo-500 transition-colors"></i>
                                ${game.title}
                            </h3>
                            <p class="text-slate-500 text-sm line-clamp-2 leading-relaxed mb-4">${game.desc}</p>
                            
                            <!-- ⭐ 모바일 드래그/스와이프형 터치 평점 남기기 세그먼트 (가이드 문구 정리) -->
                            <div class="bg-slate-50 rounded-xl p-3 border border-slate-100 flex flex-col gap-2 transition-all">
                                <div class="flex items-center justify-between">
                                    <span class="text-xs font-extrabold text-slate-500">내 평가 남기기</span>
                                    <span class="user-rating-status-${gameCardId} text-[10px] font-black text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full">아직 평가 안 함</span>
                                </div>

                                <!-- 🌟 드래그 동작을 직접 받는 고정형 터치 패널 및 완벽한 반 별 지원 SVG 커스텀 태그 -->
                                <div class="flex items-center gap-2 mt-1">
                                    <div class="star-swipe-panel-${gameCardId} flex items-center gap-1.5 py-1 select-none touch-none cursor-pointer" data-game-id="${gameCardId}">
                                        <!-- 인라인 벡터 기반 100% 호환성 별 아이콘 (0.5그라데이션 대응) -->
                                        <div class="star-item-${gameCardId} w-8 h-8 flex items-center justify-center transition-transform" data-star-idx="1">
                                            <svg class="w-7 h-7 pointer-events-none" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" fill="#e2e8f0" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                            </svg>
                                        </div>
                                        <div class="star-item-${gameCardId} w-8 h-8 flex items-center justify-center transition-transform" data-star-idx="2">
                                            <svg class="w-7 h-7 pointer-events-none" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" fill="#e2e8f0" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                            </svg>
                                        </div>
                                        <div class="star-item-${gameCardId} w-8 h-8 flex items-center justify-center transition-transform" data-star-idx="3">
                                            <svg class="w-7 h-7 pointer-events-none" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" fill="#e2e8f0" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                            </svg>
                                        </div>
                                        <div class="star-item-${gameCardId} w-8 h-8 flex items-center justify-center transition-transform" data-star-idx="4">
                                            <svg class="w-7 h-7 pointer-events-none" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" fill="#e2e8f0" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                            </svg>
                                        </div>
                                        <div class="star-item-${gameCardId} w-8 h-8 flex items-center justify-center transition-transform" data-star-idx="5">
                                            <svg class="w-7 h-7 pointer-events-none" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="2" fill="#e2e8f0" stroke-linecap="round" stroke-linejoin="round">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                                            </svg>
                                        </div>
                                    </div>
                                    <button type="button" class="rating-reset-btn-${gameCardId} hidden text-[10px] font-black text-red-500 hover:text-red-700 whitespace-nowrap px-2.5 py-1.5 rounded-md bg-red-50 hover:bg-red-100 transition-colors ml-auto">취소</button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 하단 Play 버튼 및 추가 액션 버튼(평점, 공유) 영역 (좋아요 하트 완전 제거) -->
                        <div class="mt-5 flex items-center justify-between border-t border-slate-100 pt-3">
                            <div class="flex items-center text-xs font-bold text-indigo-500 uppercase tracking-wider group-hover:translate-x-1 transition-transform pointer-events-none">
                                Play Now <span class="ml-1">→</span>
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <!-- 평균 평점 & 참여 수 표기 -->
                                <div class="avg-rating-box flex items-center gap-1 text-slate-400 px-2 py-1 rounded-lg" title="전체 평균 평점">
                                    <i data-lucide="star" class="w-4 h-4 text-amber-400 fill-amber-400"></i>
                                    <span class="avg-rating text-xs font-bold font-mono mt-0.5">0.0</span>
                                    <span class="rating-count text-[10px] text-slate-400 font-bold font-mono">(0)</span>
                                </div>

                                <div class="w-px h-3 bg-slate-200"></div>
                                
                                <!-- 공유 버튼 -->
                                <button class="share-btn flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-all p-1.5 rounded-full hover:bg-indigo-50" title="링크 복사">
                                    <i data-lucide="share-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                gridDiv.appendChild(card);
            });

            secElement.appendChild(gridDiv);
            gamesContainer.appendChild(secElement);
        });

        // ⭐ 별 그리기 핵심 공통 모듈 (어두운 테두리 없이 노란 별만 남기도록 개선)
        function drawStars(gameCardId, rating) {
            const card = document.getElementById(gameCardId);
            if (!card) return;
            const starItems = card.querySelectorAll(`.star-item-${gameCardId}`);
            starItems.forEach(item => {
                const starIdx = parseInt(item.getAttribute('data-star-idx'));
                const svg = item.querySelector('svg');
                if (svg) {
                    svg.removeAttribute('style');
                    
                    if (rating >= starIdx) {
                        // 1. 온전한 풀 스타 (테두리를 투명하게 설정하여 어두운 라인 제거)
                        svg.setAttribute('stroke', 'transparent');
                        svg.setAttribute('fill', '#fbbf24');   // amber-400
                    } else if (rating >= starIdx - 0.5) {
                        // 2. 정확한 반 별 (테두리 투명하게 한 채 그라데이션 필터 적용)
                        svg.setAttribute('stroke', 'transparent'); 
                        svg.style.fill = 'url(#half-star-grad)';
                    } else {
                        // 3. 빈 별 (정교한 연회색 테두리와 백그라운드 기본 유지)
                        svg.setAttribute('stroke', '#cbd5e1');
                        svg.setAttribute('fill', '#e2e8f0');
                    }
                }
            });
        }

        // 4. 실시간 UI 전체 동기화 함수 (인기 딱지를 좋아요 수 대신 '평점 순위' 기준으로 산정)
        function updateUI() {
            // 전역 상태에 기반해 평점(별점) 기준으로 정렬
            const sortedByRatings = Object.keys(state.games)
                .map(id => {
                    const stats = state.games[id] || { ratingSum: 0, ratingCount: 0 };
                    const avg = stats.ratingCount > 0 ? (stats.ratingSum / stats.ratingCount) : 0;
                    return { id, avg, count: stats.ratingCount };
                })
                // 평균 평점(avg) 내림차순 정렬, 동률인 경우 참여자 수(count) 많은 순 정렬
                .sort((a, b) => b.avg - a.avg || b.count - a.count);

            // 상위 3개 게임 ID 추출 (평가 참여수가 1개 이상이고 평점이 존재하는 경우만 인기 게임 인정)
            const top3Ids = sortedByRatings.slice(0, 3)
                .filter(item => item.count > 0 && item.avg > 0)
                .map(item => item.id);

            // 렌더링된 모든 게임 순회하며 수치 주입
            gameData.forEach(section => {
                section.games.forEach(game => {
                    const gameCardId = getSafeId(game.title);
                    const stats = state.games[gameCardId] || { ratingSum: 0, ratingCount: 0 };
                    
                    const avgRating = stats.ratingCount > 0 ? (stats.ratingSum / stats.ratingCount).toFixed(1) : "0.0";

                    // [한 눈에 보기 영역 동기화]
                    const miniRating = document.querySelector(`.mini-rating-${gameCardId}`);
                    const miniPopularBadge = document.querySelector(`.popular-badge-${gameCardId}`);
                    
                    if (miniRating) miniRating.textContent = avgRating;
                    
                    if (miniPopularBadge) {
                        if (top3Ids.includes(gameCardId)) {
                            miniPopularBadge.classList.remove('hidden');
                        } else {
                            miniPopularBadge.classList.add('hidden');
                        }
                    }

                    // [상세 카드 영역 동기화]
                    const card = document.getElementById(gameCardId);
                    if (card) {
                        const avgRatingSpan = card.querySelector('.avg-rating');
                        const ratingCountSpan = card.querySelector('.rating-count');
                        const popularCardBadge = card.querySelector(`.popular-card-badge-${gameCardId}`);

                        if (avgRatingSpan) avgRatingSpan.textContent = avgRating;
                        if (ratingCountSpan) ratingCountSpan.textContent = `(${stats.ratingCount})`;

                        // 카드 상세 인기 딱지 바인딩
                        if (popularCardBadge) {
                            if (top3Ids.includes(gameCardId)) {
                                popularCardBadge.classList.remove('hidden');
                            } else {
                                popularCardBadge.classList.add('hidden');
                            }
                        }

                        // 내 평점 별 채우기 상태
                        const myRating = state.userRatings[gameCardId] || 0;
                        const ratingStatusText = card.querySelector(`.user-rating-status-${gameCardId}`);
                        const ratingResetBtn = card.querySelector(`.rating-reset-btn-${gameCardId}`);

                        if (ratingStatusText) {
                            ratingStatusText.textContent = myRating > 0 ? `내가 준 평점: ⭐ ${myRating}점` : "아직 평가 안 함";
                        }

                        if (ratingResetBtn) {
                            if (myRating > 0) {
                                ratingResetBtn.classList.remove('hidden');
                            } else {
                                ratingResetBtn.classList.add('hidden');
                            }
                        }

                        drawStars(gameCardId, myRating);
                    }
                });
            });

            // Lucide 아이콘 재생성
            lucide.createIcons();
        }

        // 로컬 오프라인 데이터 수집 복구 가드 함수
        function loadLocalDataFallback() {
            gameData.forEach(section => {
                section.games.forEach(game => {
                    const gameCardId = getSafeId(game.title);
                    state.games[gameCardId] = { 
                        ratingSum: parseFloat(localStorage.getItem(`local_sum_${gameCardId}`) || "0"),
                        ratingCount: parseInt(localStorage.getItem(`local_count_${gameCardId}`) || "0")
                    };
                    state.userRatings[gameCardId] = parseFloat(localStorage.getItem(`local_rating_${gameCardId}`) || "0");
                });
            });
            updateUI();
            bindEvents(userId, false); // Firebase 없이 기동
        }

        // 5. Firestore 및 Auth 연결 & 데이터 스트리밍 초기화
        async function initFirebaseAndData() {
            try {
                // Rule 3: 비동기 인증 우선 처리 (익명 로그인 실패 대응 가드 적용)
                let currentUserId = userId;
                try {
                    const userCredential = await signInAnonymously(auth);
                    currentUserId = userCredential.user.uid;
                } catch (authError) {
                    console.warn("Firebase 익명 로그인 비활성화 혹은 인증 실패로 오프라인 로컬 저장소를 활용합니다.", authError);
                    loadLocalDataFallback();
                    return;
                }

                // [데이터 적재 1단계]: 전체 게임 공용 평점 데이터 가져오기
                const gamesColRef = collection(db, "artifacts", appId, "public", "data", "games");
                const gamesSnapshot = await getDocs(gamesColRef);
                gamesSnapshot.forEach(docSnap => {
                    state.games[docSnap.id] = docSnap.data();
                });

                // 누락된 기본 게임 문서를 DB에 자동 생성
                for (const section of gameData) {
                    for (const game of section.games) {
                        const gameCardId = getSafeId(game.title);
                        if (!state.games[gameCardId]) {
                            state.games[gameCardId] = { ratingSum: 0, ratingCount: 0 };
                            await setDoc(doc(db, "artifacts", appId, "public", "data", "games", gameCardId), state.games[gameCardId]).catch(console.error);
                        }
                    }
                }

                // [데이터 적재 2단계]: 이 유저가 과거에 남긴 개인 평점 목록 가져오기
                const ratingsColRef = collection(db, "artifacts", appId, "users", currentUserId, "ratings");
                const ratingsSnapshot = await getDocs(ratingsColRef);
                ratingsSnapshot.forEach(docSnap => {
                    state.userRatings[docSnap.id] = docSnap.data().rating;
                });

                // 최초 렌더링 갱신
                updateUI();

                // 이벤트 수신기 바인딩
                bindEvents(currentUserId, true);

            } catch (err) {
                console.error("Firebase 초기 바인딩 실패, 로컬 임시 데이터 모드로 기동합니다.", err);
                loadLocalDataFallback();
            }
        }

        // 6. 이벤트 핸들러 모음 (좋아요 로직 완전 제거)
        function bindEvents(activeUserId, useFirebase = true) {
            gameData.forEach(section => {
                section.games.forEach(game => {
                    const gameCardId = getSafeId(game.title);
                    const card = document.getElementById(gameCardId);
                    if (!card) return;

                    const shareBtn = card.querySelector('.share-btn');
                    const starSwipePanel = card.querySelector(`.star-swipe-panel-${gameCardId}`);
                    const ratingResetBtn = card.querySelector(`.rating-reset-btn-${gameCardId}`);

                    // A. 카드 자체 클릭 (게임 실행용 Iframe 모달 오프너)
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.share-btn') || e.target.closest(`[class*="star-swipe-panel-"]`) || e.target.closest(`[class*="rating-reset-btn-"]`)) return;
                        openGame(game);
                    });

                    // 🌟 C. 공통 평점 저장 비동기 함수 (드래그 확정용)
                    async function commitRating(newRating) {
                        const oldRating = state.userRatings[gameCardId] || 0;
                        if (oldRating === newRating) return;

                        if (newRating === 0) {
                            // 평점 취소 처리
                            state.userRatings[gameCardId] = 0;
                            state.games[gameCardId].ratingSum -= oldRating;
                            state.games[gameCardId].ratingCount--;

                            if (useFirebase) {
                                await setDoc(doc(db, "artifacts", appId, "users", activeUserId, "ratings", gameCardId), { rating: 0 }).catch(console.error);
                                await updateDoc(doc(db, "artifacts", appId, "public", "data", "games", gameCardId), {
                                    ratingSum: increment(-oldRating),
                                    ratingCount: increment(-1)
                                }).catch(console.error);
                            }

                            localStorage.removeItem(`local_rating_${gameCardId}`);
                            showToast(`⭐ 평점 제출을 취소했습니다.`);
                        } else {
                            // 신규 등록 또는 수정 처리
                            state.userRatings[gameCardId] = newRating;
                            let sumDiff = newRating - oldRating;
                            let countDiff = oldRating === 0 ? 1 : 0;

                            state.games[gameCardId].ratingSum += sumDiff;
                            state.games[gameCardId].ratingCount += countDiff;

                            if (useFirebase) {
                                await setDoc(doc(db, "artifacts", appId, "users", activeUserId, "ratings", gameCardId), { rating: newRating }).catch(console.error);
                                await updateDoc(doc(db, "artifacts", appId, "public", "data", "games", gameCardId), {
                                    ratingSum: increment(sumDiff),
                                    ratingCount: increment(countDiff)
                                }).catch(console.error);
                            }

                            localStorage.setItem(`local_rating_${gameCardId}`, newRating);
                            showToast(`⭐ 이 게임에 평점 ${newRating}점을 남겼습니다!`);
                        }

                        // 로컬 백업 캐시 저장
                        localStorage.setItem(`local_sum_${gameCardId}`, state.games[gameCardId].ratingSum);
                        localStorage.setItem(`local_count_${gameCardId}`, state.games[gameCardId].ratingCount);
                        
                        updateUI();
                    }

                    // 🌟 스와이프 계산기 핵심 헬퍼 함수
                    function getRatingFromPointer(clientX) {
                        const rect = starSwipePanel.getBoundingClientRect();
                        let relX = clientX - rect.left;
                        let ratio = relX / rect.width;
                        let rawRating = ratio * 5;
                        
                        // 0.5 단위 반올림 조율
                        let rating = Math.round(rawRating * 2) / 2;
                        rating = Math.max(0.5, Math.min(5, rating)); // 최소 0.5점에서 최대 5점까지 바인딩
                        
                        // 만약 슬라이더 왼쪽 밖으로 한참 벗어나면 취소하기 용이하게 0점 수용
                        if (relX < -15) rating = 0;
                        return rating;
                    }

                    let isDragging = false;

                    // 모바일 터치 및 데스크톱 마우스 통합 이벤트 리스너 (Pointer API)
                    starSwipePanel.addEventListener('pointerdown', (e) => {
                        e.stopPropagation();
                        isDragging = true;
                        starSwipePanel.setPointerCapture(e.pointerId); // 화면 밖으로 이탈시 트래킹 보장
                        const tempVal = getRatingFromPointer(e.clientX);
                        drawStars(gameCardId, tempVal);
                    });

                    starSwipePanel.addEventListener('pointermove', (e) => {
                        if (!isDragging) return;
                        e.stopPropagation();
                        const tempVal = getRatingFromPointer(e.clientX);
                        drawStars(gameCardId, tempVal);
                        
                        const statusText = card.querySelector(`.user-rating-status-${gameCardId}`);
                        if (statusText) {
                            statusText.textContent = `평가 중: ⭐ ${tempVal}점`;
                        }
                    });

                    starSwipePanel.addEventListener('pointerup', (e) => {
                        if (!isDragging) return;
                        e.stopPropagation();
                        isDragging = false;
                        starSwipePanel.releasePointerCapture(e.pointerId);
                        
                        const finalVal = getRatingFromPointer(e.clientX);
                        commitRating(finalVal);
                    });

                    starSwipePanel.addEventListener('pointercancel', (e) => {
                        isDragging = false;
                    });

                    // C-4. 평점 취소 버튼 클릭 처리
                    ratingResetBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        commitRating(0);
                    });

                    // D. 링크 복사 공유 핸들러
                    shareBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        copyToClipboard(game.url);
                        showToast(`🔗 게임 링크가 클립보드에 복사되었습니다! 친구들과 공유해보세요.`);
                    });
                });
            });
        }

        // 모달 전역 종료 제어기
        closeModalBtn.addEventListener('click', closeModal);
        gameModal.addEventListener('click', (e) => { if (e.target === gameModal) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !gameModal.classList.contains('hidden')) closeModal(); });

        // Firebase 연동 기동 시작
        initFirebaseAndData();
    </script>
</body>
